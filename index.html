<!DOCTYPE html>
<html>
<head>
    <title>30s Gym Beeper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 15px; max-width: 300px; margin: auto; }
        button { background: #d32f2f; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        #status { color: #ffd60a; margin: 15px 0; font-size: 0.9em; }
        #log { background: #111; font-size: 10px; height: 80px; overflow-y: scroll; text-align: left; padding: 10px; color: #666; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Gym Beeper</h2>
        <div id="status">Location & BT must be ON</div>
        
        <button onclick="testSound()" style="background:#444">TEST SOUND FIRST</button>
        <button id="conn">CONNECT TIMER</button>
        
        <h1 id="clock">--:--</h1>
        <div id="log">Logs: Ready...</div>
    </div>

    <script>
        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_short_beeps.ogg');
        const logger = (m) => { document.getElementById('log').innerHTML += '<br>> ' + m; };
        
        function testSound() {
            audio.play();
            logger("Sound test played.");
        }

        document.getElementById('conn').onclick = async () => {
            logger("Button clicked. Requesting device...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
                });

                logger("Device picked: " + device.name);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');

                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const s = e.target.value.getUint8(2);
                    document.getElementById('clock').innerText = "00:" + s.toString().padStart(2, '0');
                    if (s === 30) { audio.play(); logger("BEEP!"); }
                });

                document.getElementById('status').innerText = "CONNECTED";
            } catch (e) {
                logger("ERROR: " + e.message);
                console.error(e);
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Beep 30s</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { max-width: 400px; margin: 40px auto; background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        #status { margin: 20px 0; font-weight: bold; color: #ffd60a; text-transform: uppercase; letter-spacing: 1px; }
        #timer { font-size: 5em; margin: 20px 0; font-family: monospace; color: #32d74b; text-shadow: 0 0 10px rgba(50, 215, 75, 0.3); }
        button { background: #ff3b30; color: white; border: none; padding: 20px; font-size: 1.2em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        button:active { background: #d12f26; }
        .logs { font-size: 11px; color: #666; text-align: left; background: #000; padding: 10px; margin-top: 20px; height: 120px; overflow-y: auto; border-radius: 8px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="margin:0; color:#ff3b30;">GYM BEEP</h1>
    <p style="color:#666; margin-bottom:30px;">30s Warning System</p>
    
    <div id="status">Tap button to scan</div>
    <div id="timer">--:--</div>
    
    <button id="connectBtn">CONNECT TIMER</button>

    <div class="logs" id="logs">Ready. Ensure Bluetooth & Location are ON.</div>
</div>

    const statusDiv = document.getElementById('status');

    const logsDiv = document.getElementById('logs');

        p.textContent = `> ${new Date().toLocaleTimeString([], {hour12:false, minute:'2-digit', second:'2-digit'})}: ${msg}`;
        logsDiv.prepend(p);
    }

<!DOCTYPE html>
<html>
<head>
    <title>Rogue Echo 2.0 - Final Scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: monospace; text-align: center; }
        .box { border: 2px solid #333; padding: 15px; border-radius: 15px; max-width: 500px; margin: 20px auto; background: #111; }
        button { background: #d32f2f; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #raw-log { background: #050505; font-size: 11px; height: 400px; overflow-y: scroll; text-align: left; padding: 10px; color: #00ff41; border: 1px solid #222; display: flex; flex-direction: column-reverse; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#d32f2f">ECHO 2.0 FINAL SCAN</h2>
        <button id="connBtn">CONNECT & SCAN ALL CHANNELS</button>
        <div id="raw-log">Ready for deep scan...</div>
    </div>

<script>
    const logEl = document.getElementById('raw-log');
    function log(m, color="#ffd60a") {
        const div = document.createElement('div');
        div.style.color = color;
        div.textContent = `> ${m}`;
        logEl.appendChild(div);
    }

    document.getElementById('connBtn').onclick = async () => {
        try {
            log("Searching for ALL Rogue services...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000fff0-0000-1000-8000-00805f9b34fb', // Standard Rogue
                    '0000ffb0-0000-1000-8000-00805f9b34fb', // Newer Echo
                    '0000180d-0000-1000-8000-00805f9b34fb', // Heartbeat profile
                    '49535343-fe7d-4ae5-8fa9-9fafd205e455'  // Microchip fallback
                ]
            });

            const server = await device.gatt.connect();
            const services = await server.getPrimaryServices();
            log(`Found ${services.length} services. Brute-forcing notifications...`);

            for (const service of services) {
                const chars = await service.getCharacteristics();
                for (const char of chars) {
                    // Try to force notifications on EVERY characteristic found
                    try {
                        await char.startNotifications();
                        char.addEventListener('characteristicvaluechanged', (e) => {
                            const bytes = new Uint8Array(e.target.value.buffer);
                            const hex = Array.from(bytes).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
                            log(`DATA [${char.uuid.substring(4,8)}]: ${hex}`, "#00ff41");
                        });
                        log(`Listening to ${char.uuid.substring(4,8)}`, "#32d74b");
                    } catch(e) { /* skip non-notifiable */ }

                    // Send "Wake Up" pings to EVERY writable channel
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        try {
                            await char.writeValueWithoutResponse(new Uint8Array([0x03, 0x01, 0x01, 0x01]));
                            await char.writeValueWithoutResponse(new Uint8Array([0x01, 0x01]));
                            log(`Pinged ${char.uuid.substring(4,8)}`);
                        } catch(e) {}
                    }
                }
            }
            log("FULL SCAN COMPLETE. If no green data appears, the timer is encrypted.");

        } catch (e) {
            log("ERROR: " + e.message, "#ff3b30");
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Gym Beep 30s</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 15px; max-width: 350px; margin: auto; background: #111; }
        button { background: #d32f2f; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 12px; cursor: pointer; font-size: 1.1em; }
        #status { color: #ffd60a; margin: 15px 0; font-weight: bold; font-size: 0.8em; }
        #clock { font-size: 5.5em; margin: 15px 0; font-family: monospace; color: #32d74b; }
        #log { background: #000; font-size: 10px; height: 120px; overflow-y: scroll; text-align: left; padding: 12px; color: #555; border: 1px solid #222; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#d32f2f; margin:0;">ROGUE BEEP</h2>
        <div id="status">UNMUTE, THEN CONNECT</div>
        
        <button id="soundBtn" style="background:#444">1. TEST SOUND (LOUD!)</button>
        <button id="connBtn">2. CONNECT TIMER</button>
        
        <div id="clock">--:--</div>
        <div id="log">Waiting for user...</div>
    </div>

    <script>
        // High-pitch alert
        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_short_beeps.ogg');
        const logger = (m) => { 
            const l = document.getElementById('log');
            l.innerHTML += '<br>> ' + m;
            l.scrollTop = l.scrollHeight;
        };

        // This "primes" the audio for the Pixel 8
        document.getElementById('soundBtn').onclick = () => {
            audio.play().then(() => {
                logger("Audio Unlocked.");
                document.getElementById('soundBtn').style.background = "#222";
                document.getElementById('soundBtn').innerText = "AUDIO READY";
            }).catch(e => logger("Audio Blocked: Tap again."));
        };

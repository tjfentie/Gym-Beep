<!DOCTYPE html>
<html>
<head>
    <title>Gym Beep - Rogue Debug</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 10px; text-align: center; }
        .box { border: 2px solid #444; padding: 15px; border-radius: 15px; max-width: 400px; margin: auto; background: #111; }
        button { background: #d32f2f; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        #clock { font-size: 5em; color: #32d74b; margin: 10px 0; }
        #log { background: #000; font-size: 11px; height: 350px; overflow-y: scroll; text-align: left; padding: 10px; color: #0f0; border: 1px solid #333; display: flex; flex-direction: column-reverse; }
        .hex-line { color: #00ff00; border-bottom: 1px solid #222; padding: 4px 0; font-size: 12px; }
        .sys-msg { color: #ffd60a; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#d32f2f">ROGUE DEBUGGER</h2>
        <button onclick="audio.play()">1. TEST SOUND</button>
        <button onclick="connect()">2. CONNECT TIMER</button>
        
        <div id="clock">--:--</div>
        <div id="log">Logs waiting...</div>
    </div>

    <script>
        const audio = new Audio('boxing-beep2.mp3'); 
        const logEl = document.getElementById('log');

        function logger(m, isData = false) {
            const div = document.createElement('div');
            div.className = isData ? 'hex-line' : 'sys-msg';
            div.textContent = `> ${m}`;
            logEl.appendChild(div);
        }

        async function connect() {
            try {
                logger("Opening picker...");
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');

                await char.startNotifications();
                logger("CONNECTED. Data pulses starting...");

                char.addEventListener('characteristicvaluechanged', (e) => {
                    const buf = e.target.value;
                    let bytes = [];
                    let hex = "";
                    
                    for (let i = 0; i < buf.byteLength; i++) {
                        let b = buf.getUint8(i);
                        bytes.push(b);
                        // Convert to hex for the log
                        hex += b.toString(16).padStart(2, '0').toUpperCase() + " ";
                    }

                    // Print the raw data so we can see what's happening
                    logger(hex, true);

                    // SEARCH LOGIC: Rogue V2 often uses Byte 4 and 5 for time
                    // We'll try a few common positions
                    let m = bytes[1]; 
                    let s = bytes[2];
                    
                    // If the above is 0, let's look further in the packet
                    if (s === 0 && bytes.length > 4) {
                        m = bytes[3];
                        s = bytes[4];
                    }

                    document.getElementById('clock').innerText = 
                        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

                    if (s === 30) {
                        audio.play().catch(() => {});
                    }
                });
            } catch (e) {
                logger("FAIL: " + e.message);
            }
        }
    </script>
</body>
</html>

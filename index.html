<!DOCTYPE html>
<html>
<head>
    <title>Rogue Echo 2.0 Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; padding: 10px; text-align: center; }
        .box { border: 2px solid #444; padding: 15px; border-radius: 15px; max-width: 500px; margin: auto; background: #111; }
        button { background: #d32f2f; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        #clock { font-size: 5em; color: #32d74b; margin: 10px 0; }
        #raw-log { background: #050505; font-size: 11px; height: 300px; overflow-y: scroll; text-align: left; padding: 10px; color: #00ff41; border: 1px solid #222; display: flex; flex-direction: column-reverse; margin-top: 5px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#d32f2f; margin:0;">ECHO V2 SCANNER</h2>
        <button onclick="audio.play()">1. TEST SOUND</button>
        <button id="connBtn">2. CONNECT & BRUTE FORCE</button>
        <div id="clock">00:00</div>
        <div id="raw-log">Waiting for connection...</div>
    </div>

<script>
    const audio = new Audio('boxing-beep2.mp3'); 
    const rawLogEl = document.getElementById('raw-log');
    let syncInterval = null;

    function logPacket(hex) {
        const div = document.createElement('div');
        div.textContent = `> ${hex}`;
        rawLogEl.appendChild(div);
        if (rawLogEl.childNodes.length > 40) rawLogEl.removeChild(rawLogEl.firstChild);
    }

    document.getElementById('connBtn').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Rogue' }, { namePrefix: 'Echo' }],
                optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
            
            // Channel 1: The ear (Notify)
            const charNotify = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');
            // Channel 2: The mouth (Write)
            const charWrite = await service.getCharacteristic('0000fff2-0000-1000-8000-00805f9b34fb');

            await charNotify.startNotifications();
            rawLogEl.innerHTML = "<div>Handshaking...</div>";

            // Brute Force: Send every known Rogue wake-up code every second
            const codes = [
                new Uint8Array([0x03, 0x01, 0x01, 0x00]), // Standard
                new Uint8Array([0xf1, 0x01, 0x01]),       // V2 Protocol
                new Uint8Array([0x02, 0x01, 0x01]),       // Alternate
                new Uint8Array([0x03, 0x02, 0x01])        // Legacy
            ];

            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                for(let code of codes) {
                    try { await charWrite.writeValueWithoutResponse(code); } catch(e) {}
                }
            }, 1000);

            charNotify.addEventListener('characteristicvaluechanged', (e) => {
                const data = e.target.value;
                let bytes = [];
                for (let i = 0; i < data.byteLength; i++) bytes.push(data.getUint8(i));
                
                const hex = bytes.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
                logPacket(hex);

                // Auto-Clock Discovery
                // We're looking for two adjacent numbers where one is < 60 (seconds)
                for (let i = 0; i < bytes.length - 1; i++) {
                    if (bytes[i+1] < 60 && bytes[i] < 100 && bytes[i+1] > 0) {
                        document.getElementById('clock').innerText = 
                            `${String(bytes[i]).padStart(2,'0')}:${String(bytes[i+1]).padStart(2,'0')}`;
                        
                        if (bytes[i+1] === 30) {
                            audio.play().catch(() => {});
                        }
                    }
                }
            });

        } catch (e) {
            rawLogEl.innerHTML = `<div style="color:red">ERROR: ${e.message}</div>`;
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Beep – Rogue Echo 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:    #e63946;
      --green:  #2dc653;
      --yellow: #f4a261;
      --dim:    #1a1a1a;
      --mid:    #2b2b2b;
      --bright: #f1f1ef;
      --muted:  #888;
      --mono:   'Share Tech Mono', monospace;
      --display:'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: var(--bright);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      gap: 1.5rem;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 7vw, 3.5rem);
      letter-spacing: 0.12em;
      color: var(--bright);
      text-align: center;
    }
    h1 span { color: var(--red); }

    /* ── status pill ── */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--mid);
      border: 1px solid #333;
      border-radius: 999px;
      padding: 0.45rem 1.1rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      transition: color 0.3s;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-pill.connected  { color: var(--green); }
    #status-pill.connected  #status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #status-pill.active     { color: var(--red);   }
    #status-pill.active     #status-dot { background: var(--red);   box-shadow: 0 0 6px var(--red);   }
    #status-pill.warning    { color: var(--yellow); }
    #status-pill.warning    #status-dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

    /* ── main card ── */
    .card {
      background: var(--dim);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.6rem 2rem;
      width: 100%;
      max-width: 540px;
    }
    .card h2 {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* ── big timer display ── */
    #timer-display {
      font-family: var(--display);
      font-size: clamp(4rem, 18vw, 8rem);
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--bright);
      transition: color 0.3s;
      line-height: 1;
      padding: 0.5rem 0;
    }
    #timer-display.work  { color: var(--red);   }
    #timer-display.rest  { color: var(--green); }
    #timer-display.warn  { color: var(--yellow); animation: pulse 0.5s ease-in-out infinite alternate; }
    @keyframes pulse { to { opacity: 0.5; } }

    #round-display {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
      min-height: 1.2em;
    }

    /* ── state label ── */
    #state-label {
      text-align: center;
      margin-top: 0.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 1em;
    }

    /* ── buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      font-family: var(--mono);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 0.7rem 1.4rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      background: transparent;
      color: var(--bright);
    }
    button:hover { background: #2a2a2a; border-color: #666; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button.primary { background: var(--red); border-color: var(--red); color: #fff; }
    button.primary:hover { background: #c1303b; border-color: #c1303b; }
    button.danger  { border-color: var(--red); color: var(--red); }
    button.danger:hover  { background: rgba(230,57,70,0.1); }

    /* ── log / discovery pane ── */
    #log-wrap {
      width: 100%;
      max-width: 540px;
    }
    #log {
      background: #080808;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 1rem;
      height: 220px;
      overflow-y: auto;
      font-size: 0.72rem;
      line-height: 1.6;
      color: #6b6b6b;
    }
    #log .info  { color: #6b9fd4; }
    #log .ok    { color: var(--green); }
    #log .warn  { color: var(--yellow); }
    #log .err   { color: var(--red); }
    #log .data  { color: #c9c9c9; }
    #log .uuid  { color: #a78bfa; }

    /* ── UUID config section ── */
    #uuid-section label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.35rem;
      margin-top: 0.9rem;
    }
    #uuid-section input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: var(--bright);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.5rem 0.7rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #uuid-section input:focus { border-color: #666; }

    details summary {
      cursor: pointer;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      user-select: none;
      padding: 0.5rem 0;
    }
    details summary:hover { color: var(--bright); }

    hr { border: none; border-top: 1px solid #1e1e1e; }

    /* ── beep indicator ── */
    #beep-flash {
      position: fixed;
      inset: 0;
      background: var(--red);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
      z-index: 999;
    }
    #beep-flash.flash { opacity: 0.18; }
  </style>
</head>
<body>

<div id="beep-flash"></div>

<h1>GYM<span>BEEP</span></h1>
<div id="status-pill">
  <span id="status-dot"></span>
  <span id="status-text">Not connected</span>
</div>

<!-- ── Main timer display card ── -->
<div class="card">
  <h2>Timer State</h2>
  <div id="timer-display">--:--</div>
  <div id="round-display"></div>
  <div id="state-label">Waiting for data…</div>
</div>

<!-- ── Controls ── -->
<div class="btn-row">
  <button id="btn-connect" class="primary">Connect to Timer</button>
  <button id="btn-wakeup" disabled title="Tries 10 different wake-up commands on fff2 to get the timer streaming data">⚡ Send Wake-up</button>
  <button id="btn-discover" disabled>🔍 Discover Services</button>
  <button id="btn-disconnect" class="danger" disabled>Disconnect</button>
</div>

<!-- ── Config ── -->
<div class="card" style="max-width:540px;width:100%">
  <h2>Beep Settings</h2>
  <label style="display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--muted);cursor:pointer">
    <input type="checkbox" id="chk-round-start" checked style="accent-color:var(--red)">
    Beep on round start
  </label>
  <br>
  <label style="display:flex;align-items:center;gap:.6rem;font-size:.8rem;color:var(--muted);cursor:pointer">
    <input type="checkbox" id="chk-thirty" checked style="accent-color:var(--red)">
    Beep at 30 seconds remaining
  </label>
  <br>
  <details id="uuid-section">
    <summary>Advanced – UUID Configuration</summary>
    <p style="font-size:0.7rem;color:var(--muted);margin-top:.6rem;line-height:1.6">
      The Rogue timer uses proprietary Bluetooth UUIDs.
      Use <b>Discover Services</b> (after connecting) to find them, or sniff with nRF Connect / Wireshark.
      Paste the UUIDs you find below.
    </p>
    <label>Timer Service UUID</label>
    <input id="inp-service" type="text" placeholder="e.g. 0000fff0-0000-1000-8000-00805f9b34fb" value="" />
    <label>Notify Characteristic UUID (timer state / countdown)</label>
    <input id="inp-char-notify" type="text" placeholder="e.g. 0000fff1-0000-1000-8000-00805f9b34fb" value="" />
    <label>Optional: second notify characteristic</label>
    <input id="inp-char-notify2" type="text" placeholder="Leave blank if unused" value="" />
    <br>
    <button id="btn-save-uuids" style="margin-top:.5rem;font-size:.75rem;padding:.4rem 1rem;">Save UUIDs</button>
  </details>
</div>

<!-- ── Log ── -->
<div id="log-wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">
    <span style="font-size:.65rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;">Debug Log</span>
    <button id="btn-clear-log" style="font-size:.65rem;padding:.2rem .6rem;border-radius:4px;">Clear</button>
  </div>
  <div id="log"></div>
</div>

<!-- Audio -->
<audio id="beep-audio" src="boxing-beep2.mp3" preload="auto"></audio>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION
// UUIDs discovered from Rogue Echo 2.0:
//   Service  : 0000fff0-0000-1000-8000-00805f9b34fb
//   Notify   : 0000fff1-0000-1000-8000-00805f9b34fb  (device → phone)
//   Write    : 0000fff2-0000-1000-8000-00805f9b34fb  (phone → device, wake-up cmd)
// ─────────────────────────────────────────────────────────────────────────────
const KNOWN_SERVICE  = '0000fff0-0000-1000-8000-00805f9b34fb';
const KNOWN_NOTIFY   = '0000fff1-0000-1000-8000-00805f9b34fb';
const KNOWN_WRITE    = '0000fff2-0000-1000-8000-00805f9b34fb';

// Wake-up / polling commands to try on fff2.
// These are common commands used by OEM boxing/interval timer chips.
// We'll try them all in sequence and log which one triggers a response.
const WAKEUP_COMMANDS = [
  { label: 'poll-0x01',    bytes: [0x01] },
  { label: 'poll-0xAA',    bytes: [0xAA] },
  { label: 'poll-0x00',    bytes: [0x00] },
  { label: 'start-stream', bytes: [0x01, 0x00] },
  { label: 'status-req',   bytes: [0x02, 0x00] },
  { label: 'query-A0',     bytes: [0xA0] },
  { label: 'query-F0',     bytes: [0xF0] },
  { label: 'query-0x55',   bytes: [0x55] },
  { label: '3-byte-init',  bytes: [0x01, 0x01, 0x00] },
  { label: 'Rogue-hello',  bytes: [0x52, 0x47] },   // "RG" ASCII
];

const CONFIG = {
  notifyChar1: localStorage.getItem('notifyChar1') || KNOWN_NOTIFY,
  notifyChar2: localStorage.getItem('notifyChar2') || '',
  serviceUUID: localStorage.getItem('serviceUUID') || KNOWN_SERVICE,
  writeUUID:   localStorage.getItem('writeUUID')   || KNOWN_WRITE,
};

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let bleDevice = null;
let bleServer = null;
let activeNotifyChars = [];
let lastRoundState = null;   // 'work' | 'rest' | 'stopped'
let lastSeconds = null;
let thirtyBeeped = false;

// ─────────────────────────────────────────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────────────────────────────────────────
const statusPill     = document.getElementById('status-pill');
const statusText     = document.getElementById('status-text');
const timerDisplay   = document.getElementById('timer-display');
const roundDisplay   = document.getElementById('round-display');
const stateLabel     = document.getElementById('state-label');
const btnConnect     = document.getElementById('btn-connect');
const btnWakeup      = document.getElementById('btn-wakeup');
const btnDiscover    = document.getElementById('btn-discover');
const btnDisconnect  = document.getElementById('btn-disconnect');
const beepAudio      = document.getElementById('beep-audio');
const beepFlash      = document.getElementById('beep-flash');
const logEl          = document.getElementById('log');
const inpService     = document.getElementById('inp-service');
const inpChar1       = document.getElementById('inp-char-notify');
const inpChar2       = document.getElementById('inp-char-notify2');
const chkRoundStart  = document.getElementById('chk-round-start');
const chkThirty      = document.getElementById('chk-thirty');

// Populate inputs from saved values
inpService.value = CONFIG.serviceUUID;
inpChar1.value   = CONFIG.notifyChar1;
inpChar2.value   = CONFIG.notifyChar2;

// ─────────────────────────────────────────────────────────────────────────────
// LOGGING
// ─────────────────────────────────────────────────────────────────────────────
function log(msg, cls = 'info') {
  const ts  = new Date().toLocaleTimeString('en-CA', { hour12: false });
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = `[${ts}] ${msg}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}
document.getElementById('btn-clear-log').onclick = () => logEl.innerHTML = '';

// ─────────────────────────────────────────────────────────────────────────────
// BEEP
// ─────────────────────────────────────────────────────────────────────────────
function beep(reason) {
  log(`🔔 BEEP: ${reason}`, 'ok');
  beepFlash.classList.add('flash');
  setTimeout(() => beepFlash.classList.remove('flash'), 200);
  beepAudio.currentTime = 0;
  beepAudio.play().catch(e => log(`Audio error: ${e.message}`, 'err'));
}

// ─────────────────────────────────────────────────────────────────────────────
// STATUS UI
// ─────────────────────────────────────────────────────────────────────────────
function setStatus(text, cls = '') {
  statusText.textContent = text;
  statusPill.className = cls;
}

// ─────────────────────────────────────────────────────────────────────────────
// PARSE TIMER NOTIFICATION
//
// This is the part that REQUIRES reverse engineering.
// The structure below is a TEMPLATE — you must fill it in once you've sniffed
// the actual bytes the Rogue timer sends.
//
// HOW TO FIGURE THIS OUT:
//   1. Connect with nRF Connect app → find characteristics with "Notify" property
//   2. Enable notifications on each one
//   3. Start the timer and watch the hex bytes change
//   4. Match bytes to the timer state (round start, rest, countdown value)
//
// COMMON PATTERNS in boxing/interval timer BLE devices:
//   byte[0] = mode/state  (0x01=work, 0x02=rest, 0x00=idle)
//   byte[1] = minutes
//   byte[2] = seconds
//   byte[3] = round number
//
// The function below handles two common patterns. Update as needed.
// ─────────────────────────────────────────────────────────────────────────────
function parseTimerPacket(dataView, charLabel) {
  const bytes = [];
  for (let i = 0; i < dataView.byteLength; i++) bytes.push(dataView.getUint8(i));

  if (bytes.length === 0) {
    log(`← [${charLabel}] empty packet (timer idle or needs wake-up)`, 'warn');
    return;
  }

  const hex = bytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
  const dec = bytes.map(b => String(b).padStart(3,' ')).join(' ');
  log(`← [${charLabel}] HEX: ${hex}`, 'data');
  log(`           DEC: ${dec}  (${bytes.length} bytes)`, 'data');

  // ── Try to decode as ASCII text first ──
  const maybeText = bytes.every(b => b >= 0x20 && b <= 0x7e);
  if (maybeText) {
    const txt = String.fromCharCode(...bytes);
    log(`           TXT: "${txt}"`, 'data');
  }

  // ─────────────────────────────────────────────────────────────────────────
  // PACKET DECODE — update this section once you know the format.
  //
  // Run the timer and watch the DEC rows above. Look for:
  //  - A byte that changes between ~1 (work) and ~2 (rest) and ~0 (idle)
  //  - Two bytes that count down from your round time (minutes, seconds)
  //  - A byte that increments each round
  //
  // Common 8-byte Rogue/OEM format seen in similar devices:
  //   [0] header    0xAA or 0x52 etc.
  //   [1] state     0x01=work  0x02=rest  0x00=idle
  //   [2] minutes
  //   [3] seconds
  //   [4] round
  //   [5-7] checksum/padding
  //
  // Common 4-byte format:
  //   [0] state  [1] min  [2] sec  [3] round
  //
  // ─────────────────────────────────────────────────────────────────────────

  // ATTEMPT: 4-byte simple format
  if (bytes.length >= 3) {
    const s = bytes[0], m = bytes[1], sec = bytes[2];
    const r = bytes.length > 3 ? bytes[3] : null;
    if (m < 60 && sec < 60) {  // sanity check — looks like time
      if (s === 0x01)      handleWorkState(m * 60 + sec, r);
      else if (s === 0x02) handleRestState(m * 60 + sec, r);
      else if (s === 0x00) handleIdleState();
    }
  }

  // ATTEMPT: 8-byte format with 0xAA or similar header at byte[0]
  if (bytes.length >= 5 && (bytes[0] === 0xAA || bytes[0] === 0x52 || bytes[0] === 0x01)) {
    const s = bytes[1], m = bytes[2], sec = bytes[3];
    const r = bytes.length > 4 ? bytes[4] : null;
    if (m < 60 && sec < 60) {
      if (s === 0x01)      handleWorkState(m * 60 + sec, r);
      else if (s === 0x02) handleRestState(m * 60 + sec, r);
      else if (s === 0x00) handleIdleState();
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// TIMER STATE HANDLERS
// ─────────────────────────────────────────────────────────────────────────────
function handleWorkState(totalSecondsRemaining, round) {
  const mm = String(Math.floor(totalSecondsRemaining / 60)).padStart(2,'0');
  const ss = String(totalSecondsRemaining % 60).padStart(2,'0');
  timerDisplay.textContent = `${mm}:${ss}`;
  timerDisplay.className = totalSecondsRemaining <= 30 ? 'warn' : 'work';
  stateLabel.textContent = 'WORK';
  if (round !== null) roundDisplay.textContent = `Round ${round}`;
  setStatus('Connected – WORK', 'active');

  // Beep: round start (transition from non-work to work)
  if (lastRoundState !== 'work' && chkRoundStart.checked) {
    beep('Round start');
    thirtyBeeped = false;
  }

  // Beep: 30 seconds warning
  if (totalSecondsRemaining <= 30 && totalSecondsRemaining > 28 && !thirtyBeeped && chkThirty.checked) {
    beep('30 seconds remaining');
    thirtyBeeped = true;
  }
  if (totalSecondsRemaining > 30) thirtyBeeped = false;

  lastRoundState = 'work';
  lastSeconds = totalSecondsRemaining;
}

function handleRestState(totalSecondsRemaining, round) {
  const mm = String(Math.floor(totalSecondsRemaining / 60)).padStart(2,'0');
  const ss = String(totalSecondsRemaining % 60).padStart(2,'0');
  timerDisplay.textContent = `${mm}:${ss}`;
  timerDisplay.className = 'rest';
  stateLabel.textContent = 'REST';
  if (round !== null) roundDisplay.textContent = `Round ${round}`;
  setStatus('Connected – REST', 'connected');
  thirtyBeeped = false;
  lastRoundState = 'rest';
  lastSeconds = totalSecondsRemaining;
}

function handleIdleState() {
  timerDisplay.textContent = '--:--';
  timerDisplay.className = '';
  stateLabel.textContent = 'Idle / Stopped';
  roundDisplay.textContent = '';
  setStatus('Connected', 'connected');
  thirtyBeeped = false;
  lastRoundState = 'stopped';
}

// ─────────────────────────────────────────────────────────────────────────────
// BLE CONNECT
// ─────────────────────────────────────────────────────────────────────────────
let writeChar = null;  // fff2 — used to send wake-up commands

async function connect() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth not supported. Use Chrome/Edge on desktop or Android.', 'err');
    alert('Web Bluetooth is not supported.\nUse Chrome or Edge on desktop or Android.\niOS does NOT support Web Bluetooth.');
    return;
  }

  try {
    setStatus('Scanning…', '');
    log('Requesting BLE device…', 'info');

    const requestOptions = {
      // Filter by device name — Rogue timers advertise as "Echo" or similar.
      // acceptAllDevices is the fallback so you can always pick it manually.
      acceptAllDevices: true,
      // fff0 is NOT advertised — it's only available post-connection.
      // We must list it as optionalServices so Chrome allows us to access it after connecting.
      optionalServices: [KNOWN_SERVICE],
    };

    bleDevice = await navigator.bluetooth.requestDevice(requestOptions);
    log(`Device selected: "${bleDevice.name || 'Rogue Timer'}"`, 'ok');
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    log('Connecting to GATT server…', 'info');
    bleServer = await bleDevice.gatt.connect();
    log('GATT connected ✓', 'ok');

    setStatus(`Connected – subscribing…`, 'connected');
    btnDisconnect.disabled = false;
    btnDiscover.disabled   = false;
    btnConnect.disabled    = true;

    await subscribeToNotifications();

  } catch (err) {
    log(`Connection failed: ${err.message}`, 'err');
    log('Make sure the Rogue App is fully closed/disconnected before trying.', 'warn');
    setStatus('Not connected', '');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SEND WAKE-UP / WRITE COMMAND TO fff2
// ─────────────────────────────────────────────────────────────────────────────
async function sendCommand(bytes, label) {
  if (!writeChar) { log('No write characteristic available', 'err'); return false; }
  const data = new Uint8Array(bytes);
  // Try writeWithoutResponse first (faster, no ACK required), fall back to writeValue
  try {
    if (writeChar.properties && writeChar.properties.writeWithoutResponse) {
      await writeChar.writeValueWithoutResponse(data);
    } else {
      await writeChar.writeValue(data);
    }
    log(`→ Sent [${label}]: [${bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ')}]`, 'info');
    return true;
  } catch(e) {
    // If writeValue failed, try writeValueWithoutResponse as fallback
    try {
      await writeChar.writeValueWithoutResponse(data);
      log(`→ Sent (noResp) [${label}]: [${bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ')}]`, 'info');
      return true;
    } catch(e2) {
      log(`→ Write failed [${label}]: ${e2.message}`, 'err');
      return false;
    }
  }
}

async function tryAllWakeupCommands() {
  log('─── TRYING ALL WAKE-UP COMMANDS ───', 'warn');
  log('Commands are sent one at a time, 800ms apart. Watch for NOTIFY packets…', 'warn');
  for (const cmd of WAKEUP_COMMANDS) {
    if (!writeChar) { log('Lost write char — aborting sweep', 'err'); break; }
    await sendCommand(cmd.bytes, cmd.label);
    await new Promise(r => setTimeout(r, 800)); // wait for response before next
  }
  log('─── WAKE-UP SWEEP DONE ───', 'warn');
  log('If NOTIFY packets appeared above, note WHICH command triggered them.', 'warn');
}

// ─────────────────────────────────────────────────────────────────────────────
// SUBSCRIBE TO NOTIFICATIONS + GRAB WRITE CHAR
// ─────────────────────────────────────────────────────────────────────────────
async function subscribeToNotifications() {
  try {
    log(`Getting service: ${KNOWN_SERVICE}`, 'info');
    const service = await bleServer.getPrimaryService(KNOWN_SERVICE);
    log('Service fff0 found ✓', 'ok');

    // ── Get fff2 write characteristic ──
    try {
      writeChar = await service.getCharacteristic(KNOWN_WRITE);
      log('Write characteristic fff2 found ✓ (will use for wake-up commands)', 'ok');
      btnWakeup.disabled = false;
    } catch(e) {
      log(`fff2 write char not available: ${e.message}`, 'warn');
    }

    // ── Subscribe to fff1 notify characteristic ──
    try {
      const notifyC = await service.getCharacteristic(KNOWN_NOTIFY);
      await notifyC.startNotifications();
      notifyC.addEventListener('characteristicvaluechanged', (e) => {
        parseTimerPacket(e.target.value, 'fff1');
      });
      activeNotifyChars.push(notifyC);
      log('Subscribed to fff1 notifications ✓', 'ok');
    } catch(e) {
      log(`Could not subscribe to fff1: ${e.message}`, 'err');
    }

    // ── Also subscribe to any additional configured characteristic ──
    if (CONFIG.notifyChar2 && CONFIG.notifyChar2 !== KNOWN_NOTIFY) {
      try {
        const c2 = await service.getCharacteristic(CONFIG.notifyChar2);
        await c2.startNotifications();
        c2.addEventListener('characteristicvaluechanged', (e) => {
          parseTimerPacket(e.target.value, CONFIG.notifyChar2.substring(4,8));
        });
        activeNotifyChars.push(c2);
        log(`Subscribed to ${CONFIG.notifyChar2} ✓`, 'ok');
      } catch(e) {
        log(`Could not subscribe to char2: ${e.message}`, 'warn');
      }
    }

    if (activeNotifyChars.length > 0) {
      setStatus('Connected – listening', 'connected');
      log('─────────────────────────────────────────────', 'info');
      log('Subscribed! Now START your timer on the Rogue box.', 'ok');
      log('If nothing appears within 5 seconds, click ⚡ Send Wake-up.', 'warn');
      log('─────────────────────────────────────────────', 'info');
      // Do NOT auto-send here — wait for GATT to fully settle first
    }
  } catch (err) {
    log(`Subscription failed: ${err.message}`, 'err');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DISCOVER SERVICES (the UUID hunting mode)
// Connects and dumps ALL services + characteristics so you can identify the
// right ones to use. Run this once, copy the UUIDs, paste them above.
// ─────────────────────────────────────────────────────────────────────────────
async function discoverServices() {
  if (!bleServer) { log('Not connected', 'err'); return; }

  log('─── SERVICE DISCOVERY START ───', 'warn');
  log('Start your timer running BEFORE reading this output.', 'warn');

  try {
    const services = await bleServer.getPrimaryServices();
    log(`Found ${services.length} service(s):`, 'ok');

    for (const svc of services) {
      log(`\n  SERVICE: ${svc.uuid}`, 'uuid');
      try {
        const chars = await svc.getCharacteristics();
        for (const ch of chars) {
        const PROP_NAMES = ['broadcast','read','writeWithoutResponse','write','notify','indicate','authenticatedSignedWrites','reliableWrite','writableAuxiliaries'];
          const props = PROP_NAMES.filter(p => ch.properties[p]).join(', ') || 'none';
          log(`    CHAR: ${ch.uuid}  [${props}]`, 'uuid');

          // If it supports notify, subscribe temporarily and log raw bytes
          if (ch.properties.notify || ch.properties.indicate) {
            try {
              await ch.startNotifications();
              ch.addEventListener('characteristicvaluechanged', (e) => {
                const dv = e.target.value;
                const bytes = [];
                for (let i = 0; i < dv.byteLength; i++) bytes.push(dv.getUint8(i));
                log(`      ↳ NOTIFY ${ch.uuid}: [${bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ')}]`, 'data');
              });
              log(`      → Subscribed to notifications`, 'ok');
            } catch(e) {
              log(`      → Could not subscribe: ${e.message}`, 'err');
            }
          }

          // Try to read if readable
          if (ch.properties.read) {
            try {
              const val = await ch.readValue();
              const bytes = [];
              for (let i = 0; i < val.byteLength; i++) bytes.push(val.getUint8(i));
              log(`      ↳ READ: [${bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ')}]`, 'data');
            } catch(e) { /* not readable right now */ }
          }
        }
      } catch(e) {
        log(`    Could not get characteristics: ${e.message}`, 'err');
      }
    }
    log('─── SERVICE DISCOVERY DONE ───', 'warn');
    log('Look above for CHAR lines with [notify] property — those are your targets.', 'warn');
    log('Watch the "NOTIFY" lines while the timer runs to identify which carries the countdown.', 'warn');
  } catch (err) {
    log(`Discovery failed: ${err.message}`, 'err');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DISCONNECT
// ─────────────────────────────────────────────────────────────────────────────
function disconnect() {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
}

function onDisconnected() {
  log('Device disconnected', 'warn');
  setStatus('Disconnected', '');
  bleServer = null;
  writeChar = null;
  activeNotifyChars = [];
  btnDisconnect.disabled = true;
  btnDiscover.disabled   = true;
  btnWakeup.disabled     = true;
  btnConnect.disabled    = false;
  handleIdleState();
}

// ─────────────────────────────────────────────────────────────────────────────
// SAVE UUIDs
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btn-save-uuids').onclick = async () => {
  CONFIG.serviceUUID  = inpService.value.trim().toLowerCase();
  CONFIG.notifyChar1  = inpChar1.value.trim().toLowerCase();
  CONFIG.notifyChar2  = inpChar2.value.trim().toLowerCase();
  localStorage.setItem('serviceUUID',  CONFIG.serviceUUID);
  localStorage.setItem('notifyChar1',  CONFIG.notifyChar1);
  localStorage.setItem('notifyChar2',  CONFIG.notifyChar2);
  log(`UUIDs saved. Service: ${CONFIG.serviceUUID || '(none)'}`, 'ok');
  log(`Char1: ${CONFIG.notifyChar1 || '(none)'}`, 'ok');
  if (CONFIG.notifyChar2) log(`Char2: ${CONFIG.notifyChar2}`, 'ok');

  // If already connected, try subscribing now
  if (bleServer && bleServer.connected && activeNotifyChars.length === 0) {
    await subscribeToNotifications();
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// BUTTON WIRING
// ─────────────────────────────────────────────────────────────────────────────
btnConnect.onclick    = connect;
btnWakeup.onclick     = tryAllWakeupCommands;
btnDiscover.onclick   = discoverServices;
btnDisconnect.onclick = disconnect;

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
if (!navigator.bluetooth) {
  log('⚠️  Web Bluetooth not available in this browser.', 'err');
  log('   → Use Google Chrome or Microsoft Edge on desktop or Android.', 'err');
  log('   → iOS Safari does NOT support Web Bluetooth.', 'err');
  btnConnect.disabled = true;
} else {
  log('Web Bluetooth available ✓', 'ok');
  log('Click "Connect to Timer" to start. The timer must be on and in BLE pairing mode.', 'info');
  log('TIP: Disconnect from the Rogue App first — only ONE device can be connected at a time.', 'warn');
}
</script>

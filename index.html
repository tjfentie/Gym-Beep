<!DOCTYPE html>
<html>
<head>
    <title>Gym Beep 30s</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #333; padding: 20px; border-radius: 15px; max-width: 350px; margin: auto; background: #111; }
        button { background: #d32f2f; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 12px; cursor: pointer; font-size: 1.1em; }
        #status { color: #ffd60a; margin: 15px 0; font-weight: bold; font-size: 0.8em; letter-spacing: 1px; }
        #clock { font-size: 5.5em; margin: 15px 0; font-family: 'Courier New', monospace; color: #32d74b; text-shadow: 0 0 15px rgba(50, 215, 75, 0.4); }
        #log { background: #000; font-size: 10px; height: 120px; overflow-y: scroll; text-align: left; padding: 12px; color: #555; border: 1px solid #222; border-radius: 5px; line-height: 1.4; }
    </style>
</head>

        <button id="soundBtn" style="background:#444">🔊 UNMUTE AUDIO FIRST</button>
        <button id="connBtn">🔗 CONNECT TIMER</button>
        
        <div id="clock">--:--</div>
        <div id="log">Logs initialized...</div>

                audio.pause();
                audio.currentTime = 0;
                document.getElementById('soundBtn').innerText = "✅ AUDIO READY";
                document.getElementById('soundBtn').style.background = "#222";
                logger("Audio context unlocked.");
            }).catch(e => logger("Audio error: " + e));
        };

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Beep – Rogue Echo 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:    #e63946;
      --green:  #2dc653;
      --yellow: #f4a261;
      --dim:    #1a1a1a;
      --mid:    #2b2b2b;
      --bright: #f1f1ef;
      --muted:  #888;
      --mono:    'Share Tech Mono', monospace;
      --display:'Bebas Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: var(--bright); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 4rem; gap: 1.5rem; }
    h1 { font-family: var(--display); font-size: clamp(2rem, 7vw, 3.5rem); letter-spacing: 0.12em; text-align: center; }
    h1 span { color: var(--red); }
    #status-pill { display: flex; align-items: center; gap: 0.6rem; background: var(--mid); border: 1px solid #333; border-radius: 999px; padding: 0.45rem 1.1rem; font-size: 0.78rem; color: var(--muted); }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    #status-pill.connected  { color: var(--green); }
    #status-pill.connected  #status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .card { background: var(--dim); border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.6rem 2rem; width: 100%; max-width: 540px; }
    #timer-display { font-family: var(--display); font-size: clamp(4rem, 18vw, 8rem); text-align: center; line-height: 1; padding: 0.5rem 0; }
    #timer-display.work  { color: var(--red); }
    #timer-display.rest  { color: var(--green); }
    #state-label { text-align: center; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    button { font-family: var(--mono); font-size: 0.82rem; border: 1px solid #444; border-radius: 8px; padding: 0.7rem 1.4rem; cursor: pointer; background: transparent; color: var(--bright); }
    button.primary { background: var(--red); border-color: var(--red); }
    #log { background: #080808; border: 1px solid #1e1e1e; border-radius: 8px; padding: 1rem; height: 200px; overflow-y: auto; font-size: 0.72rem; color: #6b6b6b; width: 100%; max-width: 540px; }
  </style>
</head>
<body>

<h1>GYM<span>BEEP</span></h1>
<div id="status-pill">
  <span id="status-dot"></span>
  <span id="status-text">Not connected</span>
</div>

<div class="card">
  <h2>Timer State</h2>
  <div id="timer-display">--:--</div>
  <div id="state-label">Waiting for data…</div>
</div>

<div class="btn-row">
  <button id="btn-connect" class="primary">Connect to Timer</button>
  <button id="btn-test-audio">Test Audio</button>
</div>

<div id="log"></div>

<audio id="beep-audio" src="boxing-beep2.mp3" preload="auto"></audio>

<script>
let bleDevice, bleServer, writeChar;
let lastSeconds = -1;
const audio = document.getElementById('beep-audio');
const logEl = document.getElementById('log');

function log(msg, color="#6b6b6b") {
    const div = document.createElement('div');
    div.style.color = color;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById('btn-test-audio').onclick = () => {
    log("Testing audio...");
    audio.play().catch(e => log("Audio Error: " + e.message, "red"));
};

document.getElementById('btn-connect').onclick = async () => {
    try {
        log("Searching for Rogue Echo 2.0...");
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'Rogue' }, { namePrefix: 'Echo' }],
            optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
        });

        bleServer = await bleDevice.gatt.connect();
        const service = await bleServer.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
        
        const notifyChar = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');
        writeChar = await service.getCharacteristic('0000fff2-0000-1000-8000-00805f9b34fb');

        await notifyChar.startNotifications();
        document.getElementById('status-pill').className = 'connected';
        document.getElementById('status-text').innerText = 'Connected';

        notifyChar.addEventListener('characteristicvaluechanged', (e) => {
            const bytes = new Uint8Array(e.target.value.buffer);
            // Log raw hex for debugging
            const hex = Array.from(bytes).map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            log("DATA: " + hex, "#00ff41");

            if (bytes.length >= 4) {
                const m = bytes[2];
                const s = bytes[3];
                document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                
                // Beep logic (30s mark)
                if (s === 30 && lastSeconds !== 30) {
                    audio.play().catch(()=>{});
                    log("BEEP TRIGGERED", "yellow");
                }
                lastSeconds = s;
            }
        });

        // START THE HEARTBEAT (The secret for Echo 2.0)
        setInterval(async () => {
            if (writeChar) {
                try {
                    // This forces the timer to broadcast its status
                    await writeChar.writeValueWithoutResponse(new Uint8Array([0x03, 0x01, 0x01, 0x01]));
                } catch(e) {}
            }
        }, 1000);

        log("Sync active. Run your rounds!");

    } catch (e) {
        log("Connection Error: " + e.message, "red");
    }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Rogue Pulse Trigger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; padding: 10px; text-align: center; }
        .box { border: 2px solid #444; padding: 15px; border-radius: 15px; max-width: 500px; margin: auto; background: #111; }
        button { background: #d32f2f; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        #clock { font-size: 5em; color: #32d74b; margin: 10px 0; font-weight: bold; }
        #raw-log { background: #050505; font-size: 12px; height: 300px; overflow-y: scroll; text-align: left; padding: 10px; color: #00ff41; border: 1px solid #222; display: flex; flex-direction: column-reverse; margin-top: 5px; border-radius: 8px; }
        .packet { border-bottom: 1px solid #1a1a1a; padding: 5px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#d32f2f; margin-top:0;">ECHO TRIGGER V9</h2>
        <button onclick="audio.play()">TEST SOUND</button>
        <button id="connBtn">CONNECT & SYNC</button>
        <div id="clock">--:--</div>
        <div id="raw-log">Waiting for manual sync...</div>
    </div>

<script>
    const audio = new Audio('boxing-beep2.mp3'); 
    const rawLogEl = document.getElementById('raw-log');
    let lastSecond = -1;
    let syncInterval = null;

    function logPacket(hex) {
        const div = document.createElement('div');
        div.className = 'packet';
        div.textContent = `[${new Date().toLocaleTimeString()}] ${hex}`;
        rawLogEl.appendChild(div);
        if (rawLogEl.childNodes.length > 30) rawLogEl.removeChild(rawLogEl.firstChild);
    }

    document.getElementById('connBtn').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'Rogue' }, { namePrefix: 'Echo' }],
                optionalServices: ['0000fff0-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000fff0-0000-1000-8000-00805f9b34fb');
            
            // Channel 1: Hearing the timer
            const charNotify = await service.getCharacteristic('0000fff1-0000-1000-8000-00805f9b34fb');
            // Channel 2: Talking to the timer
            const charWrite = await service.getCharacteristic('0000fff2-0000-1000-8000-00805f9b34fb');

            await charNotify.startNotifications();
            
            // Every 500ms, send a "Request Status" pulse to force the timer to respond
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(async () => {
                try {
                    // This is a common "Query" command for Rogue BT modules
                    await charWrite.writeValueWithoutResponse(new Uint8Array([0x03, 0x01, 0x01, 0x00]));
                } catch(e) {}
            }, 500);

            rawLogEl.innerHTML = "<div>Sync Active. Listening...</div>";

            charNotify.addEventListener('characteristicvaluechanged', (e) => {
                const data = e.target.value;
                let bytes = [];
                for (let i = 0; i < data.byteLength; i++) bytes.push(data.getUint8(i));
                
                const hex = bytes.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
                logPacket(hex);

                // Scan all bytes for something that looks like seconds (0-59)
                // In Echo 2.0, time is often at index 3 and 4
                let m = 0, s = 0;
                if (bytes.length >= 5) {
                    m = bytes[3];
                    s = bytes[4];
                } else if (bytes.length >= 3) {
                    m = bytes[1];
                    s = bytes[2];
                }

                if (s < 60) {
                    document.getElementById('clock').innerText = 
                        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    
                    if (s === 30 && lastSecond !== 30) {
                        audio.play().catch(() => {});
                    }
                    lastSecond = s;
                }
            });

        } catch (e) {
            rawLogEl.innerHTML = `<div style="color:red">ERROR: ${e.message}</div>`;
        }
    };
</script>
</body>
</html>
